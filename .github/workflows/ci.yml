name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: |
          pip install -r requirements-ci.txt
          pip install -e . --no-deps

      - name: Ruff lint
        run: ruff check src/image_cropper/

      - name: Ruff format check
        run: ruff format --check src/image_cropper/

      - name: mypy
        run: mypy src/image_cropper/

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: |
          pip install -r requirements-ci.txt
          pip install -e . --no-deps

      - name: Run pytest
        run: pytest -q

  benchmark:
    name: Benchmark regression check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: |
          pip install -r requirements-ci.txt
          pip install -e . --no-deps

      - name: Regenerate synthetic golden images
        run: python benchmarks/create_golden.py

      - name: Run benchmark against baseline
        run: >
          python -m image_cropper.pipeline.benchmark benchmarks/golden/
          --compare benchmarks/baseline.json
          --output benchmarks/results-ci.json

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results-ci.json
