name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Ruff lint
        run: ruff check scripts/

      - name: Ruff format check
        run: ruff format --check scripts/

      - name: mypy
        run: mypy scripts/ --ignore-missing-imports

  benchmark:
    name: Benchmark regression check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: pip install -r requirements-ci.txt

      - name: Regenerate synthetic golden images
        run: python benchmarks/create_golden.py

      - name: Run benchmark against baseline
        run: >
          python scripts/benchmark.py benchmarks/golden/
          --compare benchmarks/baseline.json
          --output benchmarks/results-ci.json

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results-ci.json
